  <style>
    * { margin:0; padding:0; box-sizing:border-box; user-select:none; }
    body { font-family:"PingFang SC",sans-serif; min-height:100vh; background:#f0f2f5; padding:1.5rem; position:relative; overflow-x:hidden; }
    .bg-layer { position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; transition:opacity 2s ease; z-index:-10; background-size:cover; background-position:center; }
    .bg-layer.default-bg { background:radial-gradient(circle at 30% 40%, #ccff99, #ffb3b3, #6b8cff); }
    .bg-layer.rate-30-bg { background:radial-gradient(circle at 30% 40%, #ffaa00, #ff3300, #0066ff); }
    .bg-layer.rate-60-bg { background:radial-gradient(circle at 70% 60%, #0a192f, #2a4e77, #a8d8ff); }
    .bg-layer.rate-100-bg { background:linear-gradient(145deg, #1a1a1a, #b8860b, #ffd700, #b8860b, #1a1a1a); background-size:500% 500%; }
    body::before { content:''; position:fixed; top:0; left:0; right:0; bottom:0; pointer-events:none; background:radial-gradient(circle at var(--x,50%) var(--y,50%), rgba(255,255,255,0.2) 0%, rgba(255,255,255,0.05) 40%, transparent 80%); opacity:0.6; animation:gentleGlow 22s ease-in-out infinite; z-index:-5; }
    @keyframes gentleGlow { 0% { --x:10%; --y:10%; } 20% { --x:80%; --y:20%; } 40% { --x:70%; --y:80%; } 60% { --x:30%; --y:90%; } 80% { --x:20%; --y:40%; } 100% { --x:10%; --y:10%; } }
    .container { max-width:1400px; margin:0 auto; background:rgba(255,255,255,0.15); backdrop-filter:blur(12px); border-radius:2rem; padding:2rem; box-shadow:0 20px 40px rgba(0,0,0,0.3); border:1px solid rgba(255,255,255,0.2); }
    .header { display:flex; justify-content:space-between; align-items:center; margin-bottom:2rem; flex-wrap:wrap; gap:1rem; }
    .title-section h1 { font-size:2.5rem; font-weight:700; color:white; text-shadow:2px 2px 4px rgba(0,0,0,0.3); margin-bottom:0.5rem; }
    .motto { font-size:1.2rem; color:rgba(255,255,255,0.95); font-family:"YouYuan","幼圆",sans-serif; letter-spacing:2px; text-shadow:0 2px 4px rgba(0,0,0,0.2); }
    .btn { padding:0.6rem 1.5rem; border-radius:2rem; border:none; font-size:1rem; font-weight:500; cursor:pointer; transition:all 0.4s cubic-bezier(0.4,0,0.2,1); box-shadow:0 4px 6px rgba(0,0,0,0.1); }
    .btn-outline { background:rgba(255,255,255,0.2); backdrop-filter:blur(5px); color:white; border:1px solid rgba(255,255,255,0.3); }
    .btn-outline:hover { background:rgba(255,255,255,0.3); transform:translateY(-2px); box-shadow:0 8px 12px rgba(0,0,0,0.2); }
    .btn-destructive { background:#ff4444; color:white; }
    .btn-destructive:hover { background:#ff6666; transform:translateY(-2px); box-shadow:0 8px 12px rgba(255,68,68,0.3); }
    .btn-star { background:linear-gradient(135deg, #ffd700, #ff8c00); color:white; font-weight:600; animation:starPulse 3s ease-in-out infinite; }
    @keyframes starPulse { 0%,100% { box-shadow:0 4px 6px rgba(0,0,0,0.1); } 50% { box-shadow:0 8px 20px rgba(255,215,0,0.6); } }
    .btn-star:hover { transform:translateY(-2px) scale(1.05); animation:none; }
    .stats-container { display:flex; flex-wrap:wrap; gap:2rem; background:rgba(255,255,255,0.15); backdrop-filter:blur(5px); border-radius:1.5rem; padding:1.5rem; margin-bottom:2rem; border:1px solid rgba(255,255,255,0.2); }
    .stat-item { display:flex; align-items:center; gap:0.5rem; color:white; font-size:1.1rem; }
    .stat-label { opacity:0.8; }
    .stat-value { font-weight:700; font-size:1.3rem; }
    .stat-value.total { color:white; }
    .stat-value.completed { color:#a3ffa3; }
    .stat-value.pending { color:#ffb3b3; }
    .stat-value.rate { color:#b3d9ff; }
    .progress-bar { width:200px; height:10px; background:rgba(255,255,255,0.2); border-radius:10px; overflow:hidden; border:1px solid rgba(255,255,255,0.3); }
    .progress-fill { height:100%; background:linear-gradient(90deg, #b3d9ff, #4d79ff); transition:width 0.6s cubic-bezier(0.4,0,0.2,1); width:0%; }
    .students-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(90px, 1fr)); gap:0.8rem; }
    .student-card { aspect-ratio:1/1; background:rgba(255,255,255,0.2); backdrop-filter:blur(5px); border:2px solid rgba(255,255,255,0.3); border-radius:1rem; padding:0.5rem; cursor:pointer; transition:all 0.6s cubic-bezier(0.4,0,0.2,1); display:flex; flex-direction:column; align-items:center; justify-content:center; position:relative; overflow:hidden; }
    .student-card:hover { transform:scale(1.05) translateY(-5px); border-color:white; background:rgba(255,255,255,0.3); box-shadow:0 15px 25px rgba(0,0,0,0.3); }
    .student-card .student-name { font-size:0.8rem; font-weight:700; text-align:center; line-height:1.2; word-break:keep-all; color:#ffffff; text-shadow:0 0 4px #000000,0 0 4px #000000,0 0 4px #000000,0 0 2px #000000; letter-spacing:0.5px; }
    .student-card.rank-1 { background:linear-gradient(135deg, #ff4d4d, #ff9999); border-color:#ff4d4d; box-shadow:0 0 20px rgba(255,77,77,0.5); }
    .student-card.rank-2 { background:linear-gradient(135deg, #9b4dff, #c299ff); border-color:#9b4dff; box-shadow:0 0 20px rgba(155,77,255,0.5); }
    .student-card.rank-3 { background:linear-gradient(135deg, #2e8b57, #66cdaa); border-color:#2e8b57; box-shadow:0 0 20px rgba(46,139,86,0.5); }
    .student-card.rank-other { background:linear-gradient(135deg, #ffd700, #ffed4d); border-color:#ffd700; box-shadow:0 0 20px rgba(255,215,0,0.5); }
    .student-card .star { font-size:1.2rem; margin-bottom:0.2rem; color:white; text-shadow:0 2px 4px rgba(0,0,0,0.3); }
    .student-number { font-size:0.7rem; font-weight:600; opacity:0.8; margin-bottom:0.1rem; color:rgba(0,0,0,0.7); text-shadow:0 1px 2px rgba(255,255,255,0.3); }
    .star-modal { position:fixed; top:0; left:0; width:100%; height:100%; display:flex; align-items:center; justify-content:center; z-index:1000; pointer-events:none; }
    .star-modal.active { pointer-events:auto; }
    .star-modal .overlay { position:absolute; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); backdrop-filter:blur(8px); opacity:0; transition:opacity 0.5s ease; }
    .star-modal.active .overlay { opacity:1; }
    .star-modal .content { position:relative; background:linear-gradient(135deg,#ffd700,#ff8c00); padding:3rem 5rem; border-radius:2rem; text-align:center; transform:scale(0.5) translateY(-50px); opacity:0; transition:all 0.7s cubic-bezier(0.68,-0.55,0.265,1.55); box-shadow:0 30px 60px rgba(0,0,0,0.3); border:4px solid white; }
    .star-modal.active .content { transform:scale(1) translateY(0); opacity:1; }
    .star-modal .star-icon { font-size:5rem; animation:starTwinkle 1.2s ease-in-out infinite alternate; }
    .star-modal h2 { font-size:2.5rem; color:white; margin:1rem 0; text-shadow:2px 2px 4px rgba(0,0,0,0.3); }
    .star-modal .student-name { font-size:3rem; color:white; font-weight:700; margin-bottom:1rem; text-shadow:2px 2px 4px rgba(0,0,0,0.3); }
    .star-modal .timer { font-size:1.5rem; color:white; opacity:0.9; }
    @keyframes starTwinkle { 0%{transform:scale(1) rotate(0deg);opacity:1;} 100%{transform:scale(1.2) rotate(8deg);opacity:0.8;} }
    .floating-emoji { position:fixed; font-size:2.5rem; pointer-events:none; z-index:999; filter:drop-shadow(0 5px 15px rgba(0,0,0,0.3)); animation:emojiPop 1s cubic-bezier(0.4,0,0.2,1) forwards; }
    @keyframes emojiPop { 0%{transform:scale(0.5) rotate(0deg);opacity:0;} 25%{transform:scale(1.4) rotate(120deg);opacity:1;} 50%{transform:scale(1.6) rotate(200deg);opacity:0.9;} 75%{transform:scale(1.3) rotate(280deg);opacity:0.6;} 100%{transform:scale(2) rotate(360deg);opacity:0;} }
    .falling-container { position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:2000; }
    .falling-card { position:absolute; width:100px; height:100px; background:linear-gradient(135deg,#ffd700,#ff8c00); border-radius:1rem; display:flex; flex-direction:column; align-items:center; justify-content:center; color:white; font-weight:bold; box-shadow:0 10px 30px rgba(0,0,0,0.5); padding:0.5rem; border:2px solid rgba(255,255,255,0.5); will-change:transform,opacity; }
    .falling-card .star { font-size:1.8rem; animation:starSparkle 1s ease-in-out infinite alternate; }
    .falling-card .number { font-size:0.9rem; opacity:0.9; color:rgba(0,0,0,0.7); }
    .falling-card .name { font-size:1rem; font-weight:700; color:black; text-shadow:0 1px 2px rgba(255,255,255,0.5); }
    @keyframes starSparkle { 0%{transform:scale(1);opacity:1;} 100%{transform:scale(1.15);opacity:0.8;} }
    .completion-log { margin-top:2rem; background:rgba(255,255,255,0.15); backdrop-filter:blur(5px); border-radius:1rem; padding:1rem; border:1px solid rgba(255,255,255,0.2); }
    .completion-log h3 { color:white; margin-bottom:1rem; font-size:1.3rem; text-shadow:0 2px 4px rgba(0,0,0,0.2); }
    .log-items { display:flex; flex-wrap:wrap; gap:1rem; min-height:50px; }
    .log-item { background:rgba(255,255,255,0.2); border-radius:2rem; padding:0.5rem 1rem; color:white; font-size:0.9rem; border:1px solid rgba(255,255,255,0.3); animation:slideIn 0.5s cubic-bezier(0.4,0,0.2,1); backdrop-filter:blur(4px); }

    .log-item .time { opacity:0.7; margin-right:0.5rem; }

    .footer-note:hover { color:rgba(255,255,255,0.9); text-shadow:0 0 10px rgba(255,215,0,0.5); }

    .class-card:hover { transform:translateY(-6px) scale(1.02); background:rgba(255,255,255,0.3); border-color:rgba(255,255,255,0.6); box-shadow:0 20px 30px rgba(0,0,0,0.2); }
    .class-icon { font-size:3.5rem; margin-bottom:0.8rem; }

    //随机数啦
    function setRandomBackgrounds(){
      //制作种子!!!!!!
      const seed = Date.now();
      let rngstate = seed;
      const rand = () => {
        rngState = (rngState * 9301 + 49297) % 233280;
        return rngState / 233280;
    }
    const h1 = Math.floor(rand() * 360);
    const h2 = Math.floor(rand() * 360);
    const h3 = Math.floor(rand() * 360);
    const h4 = Math.floor(rand() * 360);

    document.getElementById('bgDefault').style.background = 
        `radial-gradient(circle at 30% 40%, hsl(${h1}, 75%, 70%), hsl(${(h1+40)%360}, 80%, 60%), hsl(${(h1+80)%360}, 70%, 50%))`;
    
    document.getElementById('bg30').style.background = 
        `radial-gradient(circle at 30% 40%, hsl(${h2}, 85%, 65%), hsl(${(h2+60)%360}, 88%, 55%), hsl(${(h2+120)%360}, 80%, 45%))`;
    
    document.getElementById('bg60').style.background = 
        `radial-gradient(circle at 70% 60%, hsl(${h3}, 70%, 45%), hsl(${(h3+90)%360}, 75%, 50%), hsl(${(h3+180)%360}, 72%, 55%))`;
    
    document.getElementById('bg100').style.background = 
        `linear-gradient(145deg, hsl(${h4}, 40%, 15%), hsl(${(h4+50)%360}, 75%, 55%), hsl(${(h4+100)%360}, 85%, 65%), hsl(${(h4+150)%360}, 70%, 50%), hsl(${h4}, 40%, 20%))`;
    document.getElementById('bg100').style.backgroundSize = '500% 500%';
}

function updateBackgroundSmooth(rate) {
  if (rate < 30) {
    document.getElementById('bgDefault').style.opacity = '1';
    document.getElementById('bg30').style.opacity = '0';
    document.getElementById('bg60').style.opacity = '0';
    document.getElementById('bg100').style.opacity = '0';
  } else if (rate >= 30 && rate < 60) {
    document.getElementById('bgDefault').style.opacity = '0';
    document.getElementById('bg30').style.opacity = '1';
    document.getElementById('bg60').style.opacity = '0';
    document.getElementById('bg100').style.opacity = '0';
  } else if (rate >= 60 && rate < 100) {
    document.getElementById('bgDefault').style.opacity = '0';
    document.getElementById('bg30').style.opacity = '0';
    document.getElementById('bg60').style.opacity = '1';
    document.getElementById('bg100').style.opacity = '0';
  } else {
    document.getElementById('bgDefault').style.opacity = '0';
    document.getElementById('bg30').style.opacity = '0';
    document.getElementById('bg60').style.opacity = '0';
    document.getElementById('bg100').style.opacity = '1';
  }
}

      function renderStudentPage() {

  // 倒计时相关变量
  let timerInterval = null;
  let currentMinutes = 0;
  let currentSeconds = 0;
  let isTimerRunning = false;
  
  // 获取DOM元素
  const minutesSpan = document.getElementById('timerMinutes');
  const secondsSpan = document.getElementById('timerSeconds');
  const startBtn = document.getElementById('startTimerBtn');
  const resetBtn = document.getElementById('resetTimerBtn');
  
  // 更新显示函数
  function updateDisplay() {
    minutesSpan.textContent = String(currentMinutes).padStart(2, '0');
    secondsSpan.textContent = String(currentSeconds).padStart(2, '0');
  }
  
  // 停止计时器
  function stopTimer() {
    if (timerInterval) {
      clearInterval(timerInterval);
      timerInterval = null;
    }
    isTimerRunning = false;
    if (startBtn) startBtn.textContent = '▶ 开始';
  }
  
  // 开始计时
  function startTimer() {
    if (isTimerRunning) return;
    if (currentMinutes === 0 && currentSeconds === 0) {
      alert('请先设置倒计时时间！');
      return;
    }
    
    isTimerRunning = true;
    if (startBtn) startBtn.textContent = '⏸ 暂停';
    
    timerInterval = setInterval(() => {
      if (currentMinutes === 0 && currentSeconds === 0) {
        // 倒计时结束
        stopTimer();
        // 显示"时间到"提示
        showTimerEndAlert();
        return;
      }
      
      if (currentSeconds === 0) {
        if (currentMinutes > 0) {
          currentMinutes--;
          currentSeconds = 59;
        }
      } else {
        currentSeconds--;
      }
      updateDisplay();
    }, 1000);
  }
  
  // 暂停计时
  function pauseTimer() {
    if (timerInterval) {
      clearInterval(timerInterval);
      timerInterval = null;
    }
    isTimerRunning = false;
    if (startBtn) startBtn.textContent = '▶ 开始';
  }
  
  // 重置计时器
  function resetTimer() {
    stopTimer();
    currentMinutes = 0;
    currentSeconds = 0;
    updateDisplay();
  }
  
  // 修改时间（分钟或秒）
  function adjustTime(type, delta) {
    if (isTimerRunning) {
      alert('请先暂停或重置倒计时再修改时间');
      return;
    }
    
    if (type === 'min') {
      let newValue = currentMinutes + delta;
      if (newValue < 0) newValue = 0;
      if (newValue > 99) newValue = 99;
      currentMinutes = newValue;
    } else if (type === 'sec') {
      let newValue = currentSeconds + delta;
      if (newValue < 0) newValue = 0;
      if (newValue > 59) newValue = 59;
      currentSeconds = newValue;
    }
    updateDisplay();
  }
  
  // 显示"时间到"提示（带动画效果）
  function showTimerEndAlert() {
    // 创建浮动提示
    const alertDiv = document.createElement('div');
    alertDiv.textContent = '⏰ 时间到！ ⏰';
    alertDiv.style.cssText = `
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);

      z-index: 2000;

      white-space: nowrap;
      font-family: "PingFang SC", sans-serif;
      letter-spacing: 4px;
    `;
    
    // 添加动画样式（如果没有的话）
    if (!document.querySelector('#timerAlertStyle')) {
      const style = document.createElement('style');
      style.id = 'timerAlertStyle';
      style.textContent = `
        @keyframes alertPop {
          0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
          80% { transform: translate(-50%, -50%) scale(1.1); }
          100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        }
        @keyframes alertFade {
          0% { opacity: 1; }
          100% { opacity: 0; visibility: hidden; }
        }
      `;
      document.head.appendChild(style);
    }
    
    document.body.appendChild(alertDiv);
    
    // 3秒倒计时
    setTimeout(() => {
      if (alertDiv.parentNode) alertDiv.remove();
    }, 1500);
    
    // 同时播放一个简单的提示音
    try {
      const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      const oscillator = audioCtx.createOscillator();
      const gainNode = audioCtx.createGain();
      oscillator.connect(gainNode);
      gainNode.connect(audioCtx.destination);
      oscillator.frequency.value = 880;
      gainNode.gain.value = 0.3;
      oscillator.start();
      gainNode.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.8);
      oscillator.stop(audioCtx.currentTime + 0.8);
    } catch(e) {
      // 浏览器不支持音频，忽略
    }
  }
  
  // 绑定按钮事件
  if (startBtn) {
    startBtn.onclick = () => {
      if (isTimerRunning) {
        pauseTimer();
      } else {
        startTimer();
      }
    };
  }
  if (resetBtn) resetBtn.onclick = resetTimer;
  
  // 绑定箭头按钮事件
  document.querySelectorAll('.timer-btn').forEach(btn => {

      const type = btn.getAttribute('data-type');

  // 获取计时器元素

  // 计时器变量
  let timerMinutes = 0;
  let timerSeconds = 0;
  let timerInterval = null;
  let isTimerRunning = false;
  
  // 更新时间显示
  function updateTimerDisplay() {
    if (timerMinutesSpan) timerMinutesSpan.textContent = String(timerMinutes).padStart(2, '0');
    if (timerSecondsSpan) timerSecondsSpan.textContent = String(timerSeconds).padStart(2, '0');
  }
  
  // 停止计时器
  function stopTimer() {
    if (timerInterval) {
      clearInterval(timerInterval);
      timerInterval = null;
    }
    isTimerRunning = false;
    if (startTimerBtn) startTimerBtn.textContent = '▶ 开始';
  }
  
  // 开始计时器
  function startTimer() {
    if (isTimerRunning) return;
    if (timerMinutes === 0 && timerSeconds === 0) {
      alert('请先设置倒计时时间！');
      return;
    }
    
    isTimerRunning = true;
    if (startTimerBtn) startTimerBtn.textContent = '⏸ 暂停';
    
    timerInterval = setInterval(() => {
      if (timerMinutes === 0 && timerSeconds === 0) {
        // 倒计时结束
        stopTimer();
        // 显示时间到提示
        showTimeUpAlert();
        return;
      }
      
      if (timerSeconds === 0) {
        if (timerMinutes > 0) {
          timerMinutes--;
          timerSeconds = 59;
        }
      } else {
        timerSeconds--;
      }
      updateTimerDisplay();
    }, 1000);
  }
  
  // 暂停计时器
  function pauseTimer() {
    if (timerInterval) {
      clearInterval(timerInterval);
      timerInterval = null;
    }
    isTimerRunning = false;
    if (startTimerBtn) startTimerBtn.textContent = '▶ 开始';
  }
  
  // 重置计时器
  function resetTimer() {
    if (isTimerRunning) {
      stopTimer();
    }
    timerMinutes = 0;
    timerSeconds = 0;
    updateTimerDisplay();
    if (startTimerBtn) startTimerBtn.textContent = '▶ 开始';
  }
  
  // 调整时间
  function adjustTime(type, delta) {
    if (isTimerRunning) {
      alert('请先暂停或重置倒计时再修改时间');
      return;
    }
    
    if (type === 'min') {
      let newValue = timerMinutes + delta;
      if (newValue < 0) newValue = 0;
      if (newValue > 99) newValue = 99;
      timerMinutes = newValue;
    } else if (type === 'sec') {
      let newValue = timerSeconds + delta;
      if (newValue < 0) newValue = 0;
      if (newValue > 59) newValue = 59;
      timerSeconds = newValue;
    }
    updateTimerDisplay();
  }

    // 1.5秒后移除提示

    // 播放提示音（可选）

      // 浏览器不支持音频，忽略

  // 绑定开始/暂停按钮事件
  if (startTimerBtn) {

      }
    };
  }
  
  // 绑定重置按钮事件
  if (resetTimerBtn) {

    };
  }
  
  // 绑定上下箭头按钮事件
  if (timerBtns.length > 0) {
    timerBtns.forEach(btn => {
      btn.onclick = function(e) {

    function getStudentRankForClass(studentId) {
      const completedStudents = currentStudents.filter(s => s.completed).sort((a,b)=>(a.completedAt||0)-(b.completedAt||0));
      const student = currentStudents.find(s=>s.id===studentId);
      if(!student || !student.completed) return null;
      const rank = completedStudents.findIndex(s=>s.id===studentId)+1;
      if(rank===1) return 'rank-1';
      if(rank===2) return 'rank-2';
      if(rank===3) return 'rank-3';
      return 'rank-other';
    }

    function renderStatsForClass() {

      const total = currentStudents.length;
      const pendingCount = total - completedCount;
      const completionRate = total === 0 ? 0 : (completedCount / total) * 100;
      updateBackgroundSmooth(completionRate);

        <div class="stat-item"><span class="stat-label">未完成：</span><span class="stat-value pending">${pendingCount}人</span></div>
        <div class="stat-item"><span class="stat-label">完成率：</span><span class="stat-value rate">${completionRate.toFixed(1)}%</span></div>
        <div class="stat-item"><div class="progress-bar"><div class="progress-fill" style="width: ${completionRate}%"></div></div></div>
      `;
    }

    window.toggleStudentInClass = function(id) {
      const student = currentStudents.find(s=>s.id===id);
      if(!student) return;
      const wasCompleted = student.completed;
      student.completed = !student.completed;
      if(student.completed && !wasCompleted) {
        student.completedAt = Date.now();
        const fixedEmoji = getFixedEmojiForStudent(student);
        const card = document.getElementById(`student-${id}`);
        if(card) {
          const rect = card.getBoundingClientRect();
          createFloatingEmoji(fixedEmoji, rect.left+rect.width/2, rect.top+rect.height/2);
        }
        if(!lastCompletedIds.has(id)) {
          const rankClass = getStudentRankForClass(id) || 'rank-other';
          completionLog.unshift({time: new Date().toLocaleTimeString('zh-CN',{hour12:false}), name:student.name, rankClass, emoji:fixedEmoji, studentId:id});
          lastCompletedIds.add(id);
          if(completionLog.length>10){ let removed=completionLog.pop(); if(removed) lastCompletedIds.delete(removed.studentId);}
        }
      } else if(!student.completed && wasCompleted) {
        student.completedAt = null;
        completionLog = completionLog.filter(log=>log.studentId!==id);
        lastCompletedIds.delete(id);

      if(completedStudents.length===0) return;
      fallingQueue = [...completedStudents];

function createFallingCardForClass(student) {

function updateFallingForClass(currentTime) { 
    if (!lastFrameTime) {
        lastFrameTime = currentTime; 
        requestAnimationFrame(updateFallingForClass); 
        return;
    } 
    
    const delta = currentTime - lastFrameTime; 
    const deltaY = (FALL_SPEED * delta) / 1000; 
    
    fallingCards = fallingCards.filter(card => { 
        if (!card.parentNode) return false; 
        
        // 获取当前位置
        let top = parseFloat(card.style.top) || 0; 
        card.style.top = (top + deltaY) + 'px';
        
        // 获取当前旋转角度（存储在data-rotation中）
        let rotation = parseFloat(card.dataset.rotation) || 0;
        // 每帧增加旋转角度（每秒旋转180度，更平滑）
        rotation += delta * 0.09;  // 0.18 = 180度/1000毫秒
        card.dataset.rotation = rotation;
        card.style.transform = `rotate(${rotation}deg)`;
        
        // 超出屏幕则移除
        if (top > window.innerHeight + 200) { 
            card.remove(); 
            return false; 
        } 
        return true; 
    }); 
    
    lastFrameTime = currentTime; 
    if (fallingCards.length > 0 || fallingQueue.length > 0) {
        requestAnimationFrame(updateFallingForClass); 
    } else { 
        isFallingActive = false; 
        lastFrameTime = 0; 
    }
}

    window.pickStar = function() {
  const completed = currentStudents.filter(s => s.completed);
  if (completed.length === 0) { 
    alert('还没有已完成背诵的学生，先去点亮几颗星星吧！✨'); 
    return; 
  }
  
  // ============ 配置区域 ============
  // 1. 被抽中后概率变小的衰减系数,避免多次重复抽到一个人(之前上课就这样,自己运气不好居然怪我写的算法,哈哈哈)
  const DECAY_FACTOR = 0.6;

  const EXCLUDE_CONFIG = {
    '11班': [17,23],
  };
  // ================================
  

  const excludeIds = EXCLUDE_CONFIG[currentClassName] || [];
  

  console.log('当前班级:', currentClassName);
  //console.log('awaID列表:', excludeIds);
  console.log('已完成人数:', completed.length);
  

  let available = completed;
  if (completed.length > 10) {
    console.log('已完成人数大于10，启用排除规则');
    if (excludeIds.length > 0) {
      available = completed.filter(s => !excludeIds.includes(s.id));
      console.log('排除前人数:', completed.length);
      console.log('排除后人数:', available.length);
      console.log('被排除的学生:', completed.filter(s => excludeIds.includes(s.id)).map(s => ({id: s.id, name: s.name})));
      

      if (available.length === 0) {
        available = completed;
        console.log('排除后无可用学生，使用全部学生');
      }
    } else {
      console.log('当前班级没有配置排除列表');
    }
  } else {
    console.log('已完成人数不大于10，不启用排除规则');
  }
  
  // 初始化权重记录
  const storageKey = `pickWeights_${currentClassName}`;
  let pickCounts = {};
  try {
    const saved = localStorage.getItem(storageKey);
    if (saved) {
      pickCounts = JSON.parse(saved);
    }
  } catch(e) {}
  
  // 构建权重池
  let weightedPool = [];
  for (let student of available) {
    const count = pickCounts[student.id] || 0;
    let weight = Math.pow(DECAY_FACTOR, count);
    weight = Math.max(weight, 0.05);
    
    const poolSize = Math.floor(weight * 100);
    for (let i = 0; i < poolSize; i++) {
      weightedPool.push(student);
    }
  }
  
  if (weightedPool.length === 0) {
    weightedPool = [...available];
  }
  
  // 随机抽取
  const lucky = weightedPool[Math.floor(Math.random() * weightedPool.length)];
  
  // 更新抽中次数
  pickCounts[lucky.id] = (pickCounts[lucky.id] || 0) + 1;
  localStorage.setItem(storageKey, JSON.stringify(pickCounts));
  
  // 调试信息：显示抽中的学生
  console.log('抽中的学生:', lucky.name, 'ID:', lucky.id);
  console.log('该学生已抽中次数:', pickCounts[lucky.id]);
  
  // 显示幸运星
  showStarModal(lucky.name);
  
  // 特效动画
  const card = document.getElementById(`student-${lucky.id}`);
  if (card) {
    card.style.transform = 'scale(1.2)';
    card.style.zIndex = '100';
    const rect = card.getBoundingClientRect();
    for (let i = 0; i < 8; i++) {
      setTimeout(() => {
        const emojis = ['⭐', '🌟', '✨', '💫', '🎉', '🏆', '👑', '💎'];
        const randomEmoji = emojis[Math.floor(Math.random() * emojis.length)];
        createFloatingEmoji(randomEmoji, rect.left + rect.width/2, rect.top + rect.height/2);
      }, i * 80);
    }
    setTimeout(() => { 
      card.style.transform = ''; 
      card.style.zIndex = ''; 
    }, 3000);
  }
};

    // ==================== 动态背景色生成（基于启动时间） ====================
// 获取启动时间并生成唯一种子
const launchTimeForColor = Date.now();
let colorRandomState = launchTimeForColor;

// 确定性随机函数（每次启动固定序列）
function seededRandom() {
    colorRandomState = (colorRandomState * 9301 + 49297) % 233280;
    return colorRandomState / 233280;
}

// 生成随机色相值（0-360）
function randomHue() {
    return Math.floor(seededRandom() * 360);
}

// 生成四个不同的随机色相（用于四个背景层）
const colorHues = {
    low: randomHue(),           // 用于 bgDefault (<30%)
    mid: randomHue(),           // 用于 bg30 (30%-60%)
    high: randomHue(),          // 用于 bg60 (60%-100%)
    full: randomHue()           // 用于 bg100 (100%)
};

// 根据色相生成渐变色
const dynamicBackgrounds = {
    low: `radial-gradient(circle at 30% 40%, hsl(${colorHues.low}, 75%, 70%), hsl(${(colorHues.low + 40) % 360}, 80%, 60%), hsl(${(colorHues.low + 80) % 360}, 70%, 50%))`,
    
    mid: `radial-gradient(circle at 30% 40%, hsl(${colorHues.mid}, 85%, 65%), hsl(${(colorHues.mid + 60) % 360}, 88%, 55%), hsl(${(colorHues.mid + 120) % 360}, 80%, 45%))`,
    
    high: `radial-gradient(circle at 70% 60%, hsl(${colorHues.high}, 70%, 45%), hsl(${(colorHues.high + 90) % 360}, 75%, 50%), hsl(${(colorHues.high + 180) % 360}, 72%, 55%))`,
    
    full: `linear-gradient(145deg, hsl(${colorHues.full}, 40%, 15%), hsl(${(colorHues.full + 50) % 360}, 75%, 55%), hsl(${(colorHues.full + 100) % 360}, 85%, 65%), hsl(${(colorHues.full + 150) % 360}, 70%, 50%), hsl(${colorHues.full}, 40%, 20%))`
};
function updateBackgroundSmooth(rate) {
    const bgDefault = document.getElementById('bgDefault');
    const bg30 = document.getElementById('bg30');
    const bg60 = document.getElementById('bg60');
    const bg100 = document.getElementById('bg100');
    
    // 设置动态生成的渐变色（只执行一次，避免重复设置）
    if (!bgDefault.hasAttribute('data-gradient-set')) {
        bgDefault.style.background = dynamicBackgrounds.low;
        bg30.style.background = dynamicBackgrounds.mid;
        bg60.style.background = dynamicBackgrounds.high;
        bg100.style.background = dynamicBackgrounds.full;
        bg100.style.backgroundSize = '500% 500%';  // 保持原有的动画效果
        bgDefault.setAttribute('data-gradient-set', 'true');
        bg30.setAttribute('data-gradient-set', 'true');
        bg60.setAttribute('data-gradient-set', 'true');
        bg100.setAttribute('data-gradient-set', 'true');
        
        // 可选：在控制台输出当前颜色方案（调试用）
        console.log('🎨 背景色方案基于启动时间:', new Date(launchTimeForColor).toLocaleString());
        console.log('色相值:', colorHues);
    }
    
    // 控制显示哪个背景层
    if (rate < 30) {
        bgDefault.style.opacity = '1';
        bg30.style.opacity = '0';
        bg60.style.opacity = '0';
        bg100.style.opacity = '0';
    } else if (rate >= 30 && rate < 60) {
        bgDefault.style.opacity = '0';
        bg30.style.opacity = '1';
        bg60.style.opacity = '0';
        bg100.style.opacity = '0';
    } else if (rate >= 60 && rate < 100) {
        bgDefault.style.opacity = '0';
        bg30.style.opacity = '0';
        bg60.style.opacity = '1';
        bg100.style.opacity = '0';
    } else {
        bgDefault.style.opacity = '0';
        bg30.style.opacity = '0';
        bg60.style.opacity = '0';
        bg100.style.opacity = '1';
    }
}
